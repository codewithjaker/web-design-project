<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card | Tailwind Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Blog Card (whole card is a link) -->
    <a href="#"
        class="block max-w-md w-full bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300 group">
        <!-- Card Image -->
        <div class="h-48 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=600&h=300&fit=crop"
                alt="Blog post cover"
                class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
        </div>
        <!-- Card Content -->
        <div class="p-6">
            <!-- Tag -->
            <span
                class="inline-block bg-indigo-100 text-indigo-700 text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wide">
                Technology
            </span>
            <!-- Title -->
            <h3 class="mt-3 text-xl font-bold text-gray-800 group-hover:text-indigo-600 transition-colors line-clamp-2">
                How Tailwind CSS Simplifies Your Workflow in 2025
            </h3>
            <!-- Date -->
            <p class="text-gray-500 text-sm mt-2">June 15, 2026 · 5 min read</p>
            <!-- Excerpt -->
            <p class="text-gray-600 mt-3 text-sm leading-relaxed line-clamp-3">
                Discover how utility-first CSS can speed up your development and keep your styles consistent. From setup
                to production, learn the modern approach.
            </p>
            <!-- Author & Avatar -->
            <div class="flex items-center mt-5 pt-4 border-t border-gray-200">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=40&h=40&fit=crop&crop=face"
                    alt="Author" class="w-8 h-8 rounded-full object-cover">
                <span class="ml-2 text-sm text-gray-700 font-medium">Naima Hasan</span>
            </div>
        </div>
    </a>

</body>

</html>
