<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Farming guides and tutorials - step-by-step instructions on crop cultivation, soil management, and best practices.">
    <title>Agricultural Information Hub | Farming Guides</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f5f5f0; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Merriweather', serif; }
        .nav-link.active { color: #2d6a4f; border-bottom: 2px solid #2d6a4f; }
    </style>
</head>
<body class="text-gray-800">

<header class="fixed top-0 w-full bg-white/95 backdrop-blur shadow-md z-50 border-b-4 border-green-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <a href="index.html" class="text-xl font-bold text-gray-900 flex items-center gap-2"><i class="fas fa-seedling text-green-700 text-2xl"></i> Agri Info Hub</a>
            <nav class="hidden lg:flex gap-8">
                <a href="index.html" class="nav-link text-sm font-medium text-gray-700 hover:text-green-700 transition">Home</a>
                <a href="guides.html" class="nav-link active text-sm font-semibold pb-1">Farming Guides</a>
                <a href="crops.html" class="nav-link text-sm font-medium text-gray-700 hover:text-green-700 transition">Crop Details</a>
                <a href="pest-control.html" class="nav-link text-sm font-medium text-gray-700 hover:text-green-700 transition">Pest Control</a>
                <a href="contact.html" class="nav-link text-sm font-medium text-gray-700 hover:text-green-700 transition">Contact</a>
            </nav>
            <button id="menuBtn" class="lg:hidden text-gray-700 focus:outline-none"><i class="fas fa-bars text-xl"></i></button>
        </div>
        <div id="mobileMenu" class="lg:hidden hidden flex-col gap-2 py-3 border-t">
            <a href="index.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-green-50">Home</a>
            <a href="guides.html" class="block px-3 py-2 rounded text-green-700 font-medium">Farming Guides</a>
            <a href="crops.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-green-50">Crop Details</a>
            <a href="pest-control.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-green-50">Pest Control</a>
            <a href="contact.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-green-50">Contact</a>
        </div>
    </div>
</header>

<section class="pt-24 pb-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl lg:text-4xl font-extrabold text-gray-900 mb-2">Farming Guides</h1>
        <p class="text-gray-600 mb-8">Comprehensive tutorials covering various aspects of farming practices.</p>

        <!-- Category Filters -->
        <div class="flex flex-wrap gap-3 mb-8">
            <button onclick="filterGuides('all')" class="px-5 py-2 bg-green-700 text-white rounded-full text-sm font-semibold">All</button>
            <button onclick="filterGuides('rice')" class="px-5 py-2 bg-gray-200 rounded-full text-sm hover:bg-gray-300 transition">Rice</button>
            <button onclick="filterGuides('vegetable')" class="px-5 py-2 bg-gray-200 rounded-full text-sm hover:bg-gray-300 transition">Vegetables</button>
            <button onclick="filterGuides('fruit')" class="px-5 py-2 bg-gray-200 rounded-full text-sm hover:bg-gray-300 transition">Fruits</button>
            <button onclick="filterGuides('seasonal')" class="px-5 py-2 bg-gray-200 rounded-full text-sm hover:bg-gray-300 transition">Seasonal</button>
        </div>

        <div id="guidesContainer" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards generated by JavaScript -->
        </div>
    </div>
</section>

<footer class="bg-gray-900 text-white py-10 border-t-4 border-green-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-400">
        <p>&copy; <span id="currentYear"></span> Agricultural Information Hub. All rights reserved.</p>
    </div>
</footer>

<script>
    document.getElementById('currentYear').textContent = new Date().getFullYear();
    document.getElementById('menuBtn').addEventListener('click', function() {
        document.getElementById('mobileMenu').classList.toggle('hidden');
    });

    const guides = [
        { title: 'Rice Cultivation: Seed to Harvest', category: 'rice', summary: 'Complete guide for Aman and Boro rice, including soil preparation, water management, and pest control.', steps: ['Land preparation', 'Seedbed raising', 'Transplanting', 'Fertilizer application', 'Irrigation', 'Harvesting'] },
        { title: 'Tomato Farming in Summer', category: 'vegetable', summary: 'Techniques for high-yield tomato production during hot seasons with shade net and drip irrigation.', steps: ['Seed selection', 'Nursery preparation', 'Transplanting', 'Staking', 'Pruning', 'Pest control'] },
        { title: 'Mango Orchard Management', category: 'fruit', summary: 'Best practices for mango cultivation, grafting, and post-harvest handling.', steps: ['Site selection', 'Grafting', 'Irrigation', 'Fertilization', 'Pest management', 'Harvesting'] },
        { title: 'Winter Vegetable Farming', category: 'seasonal', summary: 'Guide to growing cauliflower, cabbage, and radish in the winter season.', steps: ['Soil testing', 'Seed sowing', 'Mulching', 'Weed control', 'Harvesting'] },
        { title: 'Integrated Rice-Fish Farming', category: 'rice', summary: 'Combining rice cultivation with fish culture for additional income and pest control.', steps: ['Pond preparation', 'Rice transplanting', 'Fish stocking', 'Feeding', 'Harvesting'] },
    ];

    function renderGuides(filter = 'all') {
        const container = document.getElementById('guidesContainer');
        const filtered = filter === 'all' ? guides : guides.filter(g => g.category === filter);
        container.innerHTML = filtered.map(guide => `
            <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition">
                <span class="text-xs uppercase bg-green-100 text-green-700 px-3 py-1 rounded-full font-semibold">${guide.category}</span>
                <h3 class="text-lg font-bold mt-3 text-gray-900">${guide.title}</h3>
                <p class="text-sm text-gray-600 mt-2">${guide.summary}</p>
                <div class="mt-4">
                    <h4 class="font-semibold text-sm text-green-800">Key Steps:</h4>
                    <ul class="list-disc list-inside text-sm text-gray-600 mt-1">
                        ${guide.steps.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                </div>
            </div>
        `).join('');
    }

    function filterGuides(cat) {
        renderGuides(cat);
    }

    renderGuides();
</script>
</body>
</html>
