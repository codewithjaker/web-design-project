<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery | Tailwind Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome for overlay icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-6">

  <div class="max-w-6xl mx-auto">
    <h2 class="text-3xl md:text-4xl font-bold text-white text-center mb-10">Explore the World</h2>

    <!-- Gallery Grid -->
    <div class="grid gap-4 
                grid-cols-2 
                md:grid-cols-3 
                lg:grid-cols-4">

      <!-- Image 1 -->
      <div class="relative group overflow-hidden rounded-xl">
        <img 
          src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=300&fit=crop" 
          alt="Tropical beach"
          class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500"
        >
        <!-- Hover Overlay -->
        <div class="absolute inset-0 bg-black/30 group-hover:bg-black/50 transition-colors flex items-center justify-center opacity-0 group-hover:opacity-100 duration-300">
          <i class="fas fa-magnifying-glass-plus text-white text-3xl"></i>
        </div>
      </div>

      <!-- Image 2 -->
      <div class="relative group overflow-hidden rounded-xl">
        <img 
          src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=300&fit=crop" 
          alt="Misty mountains"
          class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500"
        >
        <div class="absolute inset-0 bg-black/30 group-hover:bg-black/50 transition-colors flex items-center justify-center opacity-0 group-hover:opacity-100 duration-300">
          <i class="fas fa-magnifying-glass-plus text-white text-3xl"></i>
        </div>
      </div>

      <!-- Image 3 -->
      <div class="relative group overflow-hidden rounded-xl">

          src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&h=300&fit=crop" 
          alt="Autumn forest"
          class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500"
        >
        <div class="absolute inset-0 bg-black/30 group-hover:bg-black/50 transition-colors flex items-center justify-center opacity-0 group-hover:opacity-100 duration-300">
          <i class="fas fa-magnifying-glass-plus text-white text-3xl"></i>
        </div>
      </div>

      <!-- Image 4 -->
      <div class="relative group overflow-hidden rounded-xl">
        <img

          class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500"

        <div class="absolute inset-0 bg-black/30 group-hover:bg-black/50 transition-colors flex items-center justify-center opacity-0 group-hover:opacity-100 duration-300">

        </div>
      </div>

</body>
</html>
