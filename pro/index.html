<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card | Tailwind Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome icons (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl max-w-md w-full p-4 shadow-sm hover:shadow-lg transition-shadow duration-300">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop&crop=face"
            alt="Profile picture" class="h-28 w-28 rounded-full mx-auto">
     
        <h2 class="mt-5 text-center text-3xl font-bold">Alexa Rivera</h2>
        <p class="mt-2 text-center font-bold text-indigo-600">Full‑Stack Developer</p>

        <p class="mt-2 text-center">
            Crafting clean and user‑friendly web experiences since 2016.
            Loves coffee, clean code, and Tailwind CSS.
        </p>
        <!-- Social Icons -->
        <div class="flex justify-center gap-2 mt-3">
            <a href="#"  class="text-gray-600 hover:text-indigo-600">
                <i class="fab fa-twitter fa-lg"></i>
            </a>
            <a href="#"  class="text-gray-600 hover:text-indigo-600">
                <i class="fab fa-linkedin-in fa-lg"></i>
            </a>
            <a href="#" class="text-gray-600 hover:text-indigo-600" >
                <i class="fab fa-github fa-lg"></i>
            </a>
        </div>
    </div>

</body>

</html>
