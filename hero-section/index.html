<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnable – Online Course Platform | Tailwind Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col">

  <!-- Hero Section with real information -->
  <section class="flex-grow flex items-center justify-center p-4">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-12 md:gap-16">
      
      <!-- Text Content -->
      <div class="flex-1 text-center md:text-left space-y-6">
        <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-gray-900 leading-tight">
          Master modern skills with <span class="text-indigo-600">Learnable</span>
        </h1>
        <p class="text-lg sm:text-xl text-gray-600 max-w-xl mx-auto md:mx-0">
          500+ courses on web development, data science, and design. Join 25,000+ learners and build career-ready projects.
        </p>
        <div class="flex gap-4 justify-center md:justify-start">
          <a href="#" class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors shadow-md">
            Start Free Trial
          </a>
          <a href="#" class="border-2 border-indigo-600 text-indigo-600 px-8 py-3 rounded-lg font-semibold hover:bg-indigo-50 transition-colors">
            View Pricing
          </a>
        </div>
        <p class="text-sm text-gray-400 pt-2">No credit card required · Cancel anytime</p>
      </div>

      <!-- Hero Image (realistic: a student learning) -->
      <div class="flex-1">
        <img
          src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=600&h=400&fit=crop"
          alt="Student learning online"
          class="w-full max-w-lg mx-auto rounded-2xl shadow-2xl object-cover"
        >
      </div>

    </div>
  </section>

</body>
</html>
