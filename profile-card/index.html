<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card | Tailwind Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome icons (CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <!-- Profile Card -->
  <div
    class="bg-white rounded-2xl shadow-xl p-8 max-w-sm w-full text-center hover:shadow-2xl transition-shadow duration-300">
    <!-- Profile Image -->
    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop&crop=face"
      alt="Profile picture" class="w-28 h-28 rounded-full mx-auto object-cover border-4 border-indigo-200 shadow-md">
    <!-- Name & Title -->
    <h2 class="mt-5 text-2xl font-bold text-gray-800">Alexa Rivera</h2>
    <p class="text-indigo-500 font-medium mt-1">Full‑Stack Developer</p>
    <!-- Short Bio -->
    <p class="text-gray-600 mt-4 text-sm leading-relaxed">
      Crafting clean and user‑friendly web experiences since 2016.
      Loves coffee, clean code, and Tailwind CSS.
    </p>
    <!-- Social Icons -->
    <div class="flex justify-center gap-5 mt-6">
      <a href="#" class="text-gray-500 hover:text-indigo-600 transition-colors">
        <i class="fab fa-twitter fa-lg"></i>
      </a>
      <a href="#" class="text-gray-500 hover:text-indigo-600 transition-colors">
        <i class="fab fa-linkedin-in fa-lg"></i>
      </a>
      <a href="#" class="text-gray-500 hover:text-indigo-600 transition-colors">
        <i class="fab fa-github fa-lg"></i>
      </a>
    </div>
  </div>

</body>

</html>
