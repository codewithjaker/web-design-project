<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Historical documents of the Bangladesh Liberation War - treaties, declarations, correspondence.">
    <title>Liberation War Archive | Documents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f5f0eb; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Merriweather', serif; }
        .nav-link.active { color: #b91c1c; border-bottom: 2px solid #b91c1c; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: #fefefe; margin: 5% auto; padding: 20px; border-radius: 16px; width: 90%; max-width: 600px; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
    </style>
</head>
<body class="text-gray-800">

<header class="fixed top-0 w-full bg-white/95 backdrop-blur shadow-md z-50 border-b-4 border-red-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <a href="index.html" class="text-xl font-bold text-gray-900 font-heading flex items-center gap-2"><span class="text-red-700 text-2xl">✶</span> Liberation War Archive</a>
            <nav class="hidden lg:flex gap-8">
                <a href="index.html" class="nav-link text-sm font-medium text-gray-700 hover:text-red-700 transition">Home</a>
                <a href="documents.html" class="nav-link active text-sm font-semibold pb-1">Documents</a>
                <a href="interviews.html" class="nav-link text-sm font-medium text-gray-700 hover:text-red-700 transition">Interviews</a>
                <a href="gallery.html" class="nav-link text-sm font-medium text-gray-700 hover:text-red-700 transition">Gallery</a>
                <a href="contact.html" class="nav-link text-sm font-medium text-gray-700 hover:text-red-700 transition">Contact</a>
            </nav>
            <button id="menuBtn" class="lg:hidden text-gray-700 focus:outline-none"><i class="fas fa-bars text-xl"></i></button>
        </div>
        <div id="mobileMenu" class="lg:hidden hidden flex-col gap-2 py-3 border-t">
            <a href="index.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-red-50">Home</a>
            <a href="documents.html" class="block px-3 py-2 rounded text-red-700 font-medium">Documents</a>
            <a href="interviews.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-red-50">Interviews</a>
            <a href="gallery.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-red-50">Gallery</a>
            <a href="contact.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-red-50">Contact</a>
        </div>
    </div>
</header>

<section class="pt-24 pb-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl lg:text-4xl font-extrabold text-gray-900 mb-2">Documents Archive</h1>
        <p class="text-gray-600 mb-8">Historical treaties, declarations, and official correspondence from the Liberation War of Bangladesh.</p>

        <!-- Filter Buttons -->
        <div class="flex flex-wrap gap-3 mb-8">
            <button onclick="filterDocuments('all')" class="px-5 py-2 bg-red-700 text-white rounded-full text-sm font-semibold hover:bg-red-800 transition">All</button>
            <button onclick="filterDocuments('treaty')" class="px-5 py-2 bg-gray-200 rounded-full text-sm hover:bg-gray-300 transition">Treaties</button>
            <button onclick="filterDocuments('declaration')" class="px-5 py-2 bg-gray-200 rounded-full text-sm hover:bg-gray-300 transition">Declarations</button>
            <button onclick="filterDocuments('correspondence')" class="px-5 py-2 bg-gray-200 rounded-full text-sm hover:bg-gray-300 transition">Correspondence</button>
        </div>

        <!-- Documents Grid -->
        <div id="documentsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be generated by JS -->
        </div>
    </div>
</section>

<!-- Modal for Document Detail -->
<div id="documentModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>
        <p id="modalDate" class="text-sm text-gray-500 mb-3"></p>
        <p id="modalDesc" class="mb-3"></p>
        <p id="modalSource" class="text-sm italic text-gray-600"></p>
    </div>
</div>

<footer class="bg-gray-900 text-white py-10 border-t-4 border-red-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-400">
        <p>&copy; <span id="currentYear"></span> Liberation War Archive. All rights reserved.</p>
    </div>
</footer>

<script>
    document.getElementById('currentYear').textContent = new Date().getFullYear();
    document.getElementById('menuBtn').addEventListener('click', function() {
        document.getElementById('mobileMenu').classList.toggle('hidden');
    });

    const documents = [
        { title: 'Proclamation of Independence', type: 'declaration', date: '10 April 1971', desc: 'Formal declaration of independence of Bangladesh, proclaimed by the Mujibnagar Government.', source: 'Bangladesh Government Archives' },
        { title: 'Indo-Soviet Treaty of Peace, Friendship and Cooperation', type: 'treaty', date: '9 August 1971', desc: 'Treaty between India and Soviet Union that provided diplomatic support to Bangladesh.', source: 'Ministry of External Affairs, India' },
        { title: 'Instrument of Surrender', type: 'treaty', date: '16 December 1971', desc: 'The document signed by Pakistani General A.A.K. Niazi, surrendering to the joint forces.', source: 'National Museum, Dhaka' },
        { title: 'Mujibnagar Government Correspondence', type: 'correspondence', date: 'April-December 1971', desc: 'Letters exchanged between the provisional government and international bodies.', source: 'Liberation War Museum' },
        { title: 'UN Security Council Resolution 307', type: 'declaration', date: '21 December 1971', desc: 'UN resolution calling for ceasefire and withdrawal of troops.', source: 'United Nations Archives' },
        { title: 'Sector Commanders Meeting Minutes', type: 'correspondence', date: 'July 1971', desc: 'Minutes of meetings of sector commanders discussing war strategy.', source: 'Bangladesh Army Archives' }
    ];

    function renderDocuments(filter = 'all') {
        const grid = document.getElementById('documentsGrid');
        const filtered = filter === 'all' ? documents : documents.filter(d => d.type === filter);
        grid.innerHTML = filtered.map((doc, idx) => `
            <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition cursor-pointer" onclick="openModal(${idx}, '${filter}')">
                <span class="text-xs uppercase bg-red-100 text-red-700 px-3 py-1 rounded-full font-semibold">${doc.type}</span>
                <h3 class="text-lg font-bold mt-3">${doc.title}</h3>
                <p class="text-sm text-gray-500 mt-1">${doc.date}</p>
            </div>
        `).join('');
    }

    let currentFilter = 'all';
    function filterDocuments(type) {
        currentFilter = type;
        renderDocuments(type);
    }

    let visibleDocs = documents;
    function openModal(idx, filter) {
        visibleDocs = filter === 'all' ? documents : documents.filter(d => d.type === filter);
        const doc = visibleDocs[idx];
        document.getElementById('modalTitle').innerText = doc.title;
        document.getElementById('modalDate').innerText = doc.date;
        document.getElementById('modalDesc').innerText = doc.desc;
        document.getElementById('modalSource').innerText = 'Source: ' + doc.source;
        document.getElementById('documentModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('documentModal').style.display = 'none';
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('documentModal')) closeModal();
    }

    renderDocuments();
</script>
</body>
</html>
